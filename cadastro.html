
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Meu Portal</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #888888;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card-cadastro {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }

        .campo-grupo {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3f4182;
        }

        .btn-finalizar {
            width: 100%;
            padding: 15px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-finalizar:hover {
            background-color: #1d4ed8;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #999;
            font-size: 0.8rem;
        }
    </style>

</head>

<body>

    <div class="card-cadastro">
        <h2>Crie sua conta</h2>

        <!-- ARRUMADO AQUI -->
        <form action="servicos.html">

            <div class="campo-grupo">
                <label>Nome Completo</label>
                <input type="text" placeholder="Ex: Gabriella Cruz" required>
            </div>

            <div class="campo-grupo">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo-grupo">
                <label>Telefone</label>
                <input type="tel" placeholder="(00) 00000-0000" required>
            </div>

            <div class="campo-grupo">
                <label>Senha</label>
                <input type="password" placeholder="Mínimo 6 caracteres" required>
            </div>

            <button type="submit" class="btn-finalizar">
                CONCLUIR CADASTRO
            </button>

        </form>

        <a href="index.html" class="voltar">
            ← Voltar para o início
        </a>

    </div>

</body>
</html>
